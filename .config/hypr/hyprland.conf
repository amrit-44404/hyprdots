source=~/.config/hypr/binds.conf
source=~/.config/hypr/autostart.conf
source=~/.config/hypr/animations.conf
# autogenerated = 1 # remove this line to remove the warning

### MONITORS ###
monitor=,preferred,auto,1

### ENVIRONMENT VARIABLES ###
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

### LOOK AND FEEL ###
general { 
    gaps_in = 5
    gaps_out = 15

    border_size = 0
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    resize_on_border = false 
    allow_tearing = false
    layout = dwindle
}
decoration {
    rounding = 0
    active_opacity = 1.0
    inactive_opacity = 1.0
    drop_shadow = true
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

### INPUT ###
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0.3 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

binds {
    allow_workspace_cycles = true
  }

windowrulev2 = suppressevent maximize, class:.* # You'll probably like this.

# Example windowrule v2
windowrule=float,^(imv)$
windowrule=center,^(MuPDF)$
windowrule=float,^(MuPDF)$
windowrulev2 = suppressevent maximize, class:.* # You'll probably like this.

# █▄▀ █▀▀ █▄█ █▄▄ █ █▄░█ █▀▄ █ █▄░█ █▀▀ █▀
# █░█ ██▄ ░█░ █▄█ █ █░▀█ █▄▀ █ █░▀█ █▄█ ▄█

$mainMod = SUPER # Sets "Windows" key as main modifier

$terminal = foot
$browser = firefox
$menu = wofi --show drun
$swaylock = swaylock

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, B, exec, $browser
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, exit,
bind = $mainMod, W, togglefloating,
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, E, pseudo, # dwindle
bind = $mainMod, F, togglesplit, # dwindle

#lock screen
bind = $mainMod, Backspace, exec, $swaylock

# Move focus with mainMod + arrow keys
bind = $mainMod SHIFT, H, movefocus, l
bind = $mainMod SHIFT, L, movefocus, r
bind = $mainMod SHIFT, K, movefocus, u
bind = $mainMod SHIFT, J, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Switch between most recent workspace
bind = $mainMod, TAB, workspace, previous

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, -1
bind = $mainMod, mouse_up, workspace, +1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Brightness control
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+ # increase brightness
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%- # decrease brightness
bindel = Alt, P, exec, brightnessctl set 5%+ # increase brightness
bindel = Alt, L, exec, brightnessctl set 6%- # increase brightness

bindel = $mainMod, L, resizeactive, 25 0
bindel = $mainMod, H, resizeactive, -25 0
bindel = $mainMod, K, resizeactive, 0 -25
bindel = $mainMod, J, resizeactive, 0 25

# Voluem
bindel=, XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel=, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl=, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# volume MechKey
bindel=, F12, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel=, F11, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl=, F10, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel=, F9, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 0%
